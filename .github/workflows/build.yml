name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.x"

jobs:
  test:
    name: Test and vet (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

  macos-binaries:
    name: Build macOS binary (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            artifact: herald-darwin-arm64
          - arch: amd64
            runner: macos-15-intel
            artifact: herald-darwin-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build Herald
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "dist/${{ matrix.artifact }}"
          go build -trimpath -ldflags "-s -w" -o "dist/${{ matrix.artifact }}/herald" ./main.go
          tar -czf "dist/${{ matrix.artifact }}.tar.gz" -C "dist/${{ matrix.artifact }}" herald
          shasum -a 256 "dist/${{ matrix.artifact }}.tar.gz" > "dist/${{ matrix.artifact }}.sha256"

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.sha256

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [test, macos-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download macOS binaries
        uses: actions/download-artifact@v4
        with:
          pattern: herald-darwin-*
          path: dist
          merge-multiple: true

      - name: Create combined checksum file
        run: |
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Herald ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/checksums.txt
