name: Nightly

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.x"

jobs:
  test:
    name: Test and vet (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

  build-macos:
    name: Build macOS nightly (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: amd64
            runner: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build, smoke, and package nightly binaries
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          HERALD_GOOGLE_CLIENT_ID: ${{ secrets.HERALD_NIGHTLY_GOOGLE_CLIENT_ID }}
          HERALD_GOOGLE_CLIENT_SECRET: ${{ secrets.HERALD_NIGHTLY_GOOGLE_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${HERALD_GOOGLE_CLIENT_ID}" ] || [ -z "${HERALD_GOOGLE_CLIENT_SECRET}" ]; then
            echo "::error::Missing HERALD_NIGHTLY_GOOGLE_CLIENT_ID or HERALD_NIGHTLY_GOOGLE_CLIENT_SECRET repository secret"
            exit 1
          fi

          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          build_day="$(date -u +%Y%m%d)"
          short_sha="$(git rev-parse --short=12 HEAD)"
          version="nightly-${build_day}-${short_sha}"
          artifact="herald-${version}-darwin-${GOARCH}"
          out_dir="dist/${artifact}"
          mkdir -p "${out_dir}"

          ldflags="-s -w"
          ldflags="${ldflags} -X github.com/herald-email/herald-mail-app/internal/version.Version=${version}"
          ldflags="${ldflags} -X github.com/herald-email/herald-mail-app/internal/version.Commit=${GITHUB_SHA}"
          ldflags="${ldflags} -X github.com/herald-email/herald-mail-app/internal/version.Date=${build_date}"
          ldflags="${ldflags} -X github.com/herald-email/herald-mail-app/internal/oauth.defaultClientID=${HERALD_GOOGLE_CLIENT_ID}"
          ldflags="${ldflags} -X github.com/herald-email/herald-mail-app/internal/oauth.defaultClientSecret=${HERALD_GOOGLE_CLIENT_SECRET}"

          go build -trimpath -ldflags "${ldflags}" -o "${out_dir}/herald" ./cmd/herald
          go build -trimpath -ldflags "${ldflags}" -o "${out_dir}/herald-mcp-server" ./cmd/herald-mcp-server
          go build -trimpath -ldflags "${ldflags}" -o "${out_dir}/herald-ssh-server" ./cmd/herald-ssh-server

          "${out_dir}/herald" --version
          "${out_dir}/herald" mcp --version
          "${out_dir}/herald" ssh --version
          "${out_dir}/herald-mcp-server" --version
          "${out_dir}/herald-ssh-server" --version
          "${out_dir}/herald" --help >/tmp/herald-help.txt
          grep -q 'herald mcp' /tmp/herald-help.txt
          grep -q 'herald ssh' /tmp/herald-help.txt
          "${out_dir}/herald" mcp --help >/tmp/herald-mcp-subcommand-help.txt
          "${out_dir}/herald" ssh --help >/tmp/herald-ssh-subcommand-help.txt
          "${out_dir}/herald-mcp-server" --help >/tmp/herald-mcp-help.txt
          "${out_dir}/herald-ssh-server" --help >/tmp/herald-ssh-help.txt
          printf '{"jsonrpc":"2.0","id":1,"method":"tools/list"}\n' | "${out_dir}/herald" mcp --demo >/tmp/herald-mcp-tools.json
          grep -q '"tools"' /tmp/herald-mcp-tools.json

          tar -czf "dist/${artifact}.tar.gz" -C dist "${artifact}"
          shasum -a 256 "dist/${artifact}.tar.gz" | tee "dist/${artifact}.sha256"

      - name: Upload macOS nightly artifact
        uses: actions/upload-artifact@v6
        with:
          name: herald-nightly-darwin-${{ matrix.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 14
